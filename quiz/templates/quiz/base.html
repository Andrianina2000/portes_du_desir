<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Intimement Nous — Test de connexion intime{% endblock %}</title>
    {% load static %}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Jost:wght@200;300;400;500&family=Dancing+Script:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --beige:      #C5B8A3;
            --sable:      #EDDDAA;
            --rose:       #DE8284;
            --bordeaux:   #8C1827;
            --creme:      #F7F0E8;
            --blanc-doux: #FDF8F3;
            --brun-doux:  #6B5B4E;
            --brun-leger: #A0907F;
            --fond:       #1A0F0D;
            --fond-card:  rgba(42,22,18,0.65);
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Jost', sans-serif;
            font-weight: 300;
            background: var(--fond);
            color: var(--creme);
            min-height: 100vh;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed; inset: 0;
            background:
                radial-gradient(ellipse 90% 70% at 15% 5%,  rgba(140,24,39,0.22)  0%, transparent 55%),
                radial-gradient(ellipse 70% 90% at 85% 95%, rgba(197,184,163,0.12) 0%, transparent 55%),
                radial-gradient(ellipse 30% 40% at 80% 20%, rgba(222,130,132,0.08) 0%, transparent 50%);
            pointer-events: none; z-index: 0;
        }
        body::after {
            content: '';
            position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none; z-index: 0; opacity: 0.4;
        }
        .page-wrapper {
            position: relative; z-index: 1;
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            padding: 48px 20px 72px;
        }
        /* ── Header avec vrai logo ── */
        .site-header {
            width: 100%; max-width: 800px;
            text-align: center;
            margin-bottom: 56px;
            padding-bottom: 36px;
            border-bottom: 1px solid rgba(197,184,163,0.15);
            animation: fadeDown 1s cubic-bezier(0.16,1,0.3,1) both;
        }
        .site-logo {
            display: inline-block;
            text-decoration: none;
        }
        .site-logo img {
            height: 250px;
            width: auto;
            opacity: 1;
            transition: opacity 0.3s;
        }
        .site-logo:hover img { opacity: 1; }
        .site-tagline {
            font-size: 0.67rem;
            letter-spacing: 0.42em;
            text-transform: uppercase;
            color: var(--brun-leger);
            margin-top: 10px;
            font-weight: 300;
            display: block;
        }
        .logo-ornement {
            display: flex; align-items: center; justify-content: center;
            gap: 10px; margin-top: 16px;
        }
        .logo-ornement-line { width: 40px; height: 1px; background: linear-gradient(90deg, transparent, rgba(197,184,163,0.3)); }
        .logo-ornement-line.right { background: linear-gradient(90deg, rgba(197,184,163,0.3), transparent); }
        .logo-ornement-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--rose); opacity: 0.6; }

        .container { width: 100%; max-width: 700px; animation: fadeUp 1s cubic-bezier(0.16,1,0.3,1) 0.15s both; }

        .card {
            background: var(--fond-card);
            border: 1px solid rgba(197,184,163,0.14);
            border-radius: 3px; padding: 48px;
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            position: relative; overflow: hidden;
        }
        .card::before {
            content: ''; position: absolute;
            top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, var(--rose), var(--sable), transparent);
            opacity: 0.4;
        }

        h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.2rem,6vw,3.4rem); font-weight: 300; line-height: 1.12; color: var(--blanc-doux); margin-bottom: 20px; }
        h1 em { font-style: italic; color: var(--sable); }
        h2 { font-family: 'Cormorant Garamond', serif; font-size: clamp(1.6rem,3.5vw,2.2rem); font-weight: 400; color: var(--sable); margin-bottom: 14px; }
        h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-weight: 400; color: var(--blanc-doux); margin-bottom: 10px; }
        p { line-height: 1.8; color: var(--beige); font-size: 0.95rem; }

        .btn { display: inline-flex; align-items: center; gap: 12px; padding: 15px 36px; font-family: 'Jost', sans-serif; font-size: 0.75rem; font-weight: 400; letter-spacing: 0.22em; text-transform: uppercase; text-decoration: none; border: none; cursor: pointer; transition: all 0.45s cubic-bezier(0.16,1,0.3,1); border-radius: 1px; position: relative; overflow: hidden; }
        .btn-primary { background: linear-gradient(135deg,var(--bordeaux),#b02035); color: var(--creme); box-shadow: 0 4px 20px rgba(140,24,39,0.3); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 35px rgba(140,24,39,0.45); }
        .btn-outline { background: transparent; color: var(--beige); border: 1px solid rgba(197,184,163,0.35); }
        .btn-outline:hover { background: rgba(197,184,163,0.07); border-color: var(--beige); transform: translateY(-1px); }
        .btn-ghost { background: rgba(255,255,255,0.04); color: var(--brun-leger); border: 1px solid rgba(197,184,163,0.12); font-size: 0.72rem; }
        .btn-ghost:hover { background: rgba(197,184,163,0.08); color: var(--beige); }
        .btn-rose { background: linear-gradient(135deg,var(--rose),#c96870); color: #fff; box-shadow: 0 4px 20px rgba(222,130,132,0.25); }
        .btn-rose:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(222,130,132,0.35); }

        .form-group { margin-bottom: 28px; }
        .form-label { display: block; font-size: 0.7rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--brun-leger); margin-bottom: 12px; font-weight: 400; }
        .form-control { width: 100%; padding: 15px 20px; background: rgba(15,8,6,0.5); border: 1px solid rgba(197,184,163,0.18); color: var(--blanc-doux); font-family: 'Jost', sans-serif; font-size: 0.95rem; font-weight: 300; transition: border-color 0.35s, box-shadow 0.35s; outline: none; border-radius: 2px; }
        .form-control:focus { border-color: rgba(222,130,132,0.5); box-shadow: 0 0 0 3px rgba(222,130,132,0.08); }
        .form-control::placeholder { color: rgba(107,91,78,0.5); }
        textarea.form-control { resize: vertical; min-height: 130px; }

        .consent-label { display: flex; align-items: flex-start; gap: 16px; cursor: pointer; padding: 20px; border: 1px solid rgba(197,184,163,0.12); background: rgba(15,8,6,0.3); transition: border-color 0.35s; border-radius: 2px; }
        .consent-label:hover { border-color: rgba(222,130,132,0.25); }
        .consent-label input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--rose); flex-shrink: 0; margin-top: 2px; cursor: pointer; }
        .consent-text { font-size: 0.83rem; color: var(--brun-leger); line-height: 1.7; }

        .choice-option { display: flex; align-items: center; gap: 16px; padding: 18px 22px; border: 1px solid rgba(197,184,163,0.1); background: rgba(15,8,6,0.25); margin-bottom: 10px; cursor: pointer; transition: all 0.3s cubic-bezier(0.16,1,0.3,1); position: relative; overflow: hidden; border-radius: 2px; }
        .choice-option::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 0; background: linear-gradient(180deg,var(--rose),var(--bordeaux)); transition: width 0.3s ease; }
        .choice-option:hover { border-color: rgba(222,130,132,0.3); background: rgba(222,130,132,0.04); transform: translateX(3px); }
        .choice-option:has(input:checked) { border-color: rgba(222,130,132,0.45); background: rgba(222,130,132,0.07); }
        .choice-option:has(input:checked)::before { width: 3px; }
        .choice-option input[type="radio"] { width: 18px; height: 18px; accent-color: var(--rose); flex-shrink: 0; cursor: pointer; }
        .choice-text { font-size: 0.9rem; color: var(--creme); line-height: 1.55; }

        .messages { margin-bottom: 28px; }
        .message { padding: 15px 20px; border-left: 2px solid var(--sable); background: rgba(237,221,170,0.06); color: var(--sable); font-size: 0.87rem; margin-bottom: 10px; border-radius: 0 2px 2px 0; }
        .message.warning { border-color: var(--rose); background: rgba(222,130,132,0.06); color: var(--rose); }
        .field-errors { font-size: 0.77rem; color: #e87070; margin-top: 8px; }

        .sep { height: 1px; background: linear-gradient(90deg,transparent,rgba(197,184,163,0.2),transparent); margin: 36px 0; }
        .ornement { display: flex; align-items: center; gap: 16px; margin-bottom: 32px; }
        .ornement-line { flex: 1; height: 1px; background: linear-gradient(90deg,transparent,rgba(197,184,163,0.3)); }
        .ornement-line.right { background: linear-gradient(90deg,rgba(197,184,163,0.3),transparent); }
        .ornement-diamond { width: 7px; height: 7px; background: var(--rose); transform: rotate(45deg); flex-shrink: 0; opacity: 0.8; }

        .text-sable { color: var(--sable); } .text-rose { color: var(--rose); } .text-beige { color: var(--beige); } .text-muted { color: var(--brun-leger); }
        .mt-4 { margin-top: 16px; } .mt-6 { margin-top: 24px; } .mt-8 { margin-top: 32px; }
        .mb-4 { margin-bottom: 16px; } .mb-6 { margin-bottom: 24px; }

        @keyframes fadeDown { from { opacity:0; transform:translateY(-24px); } to { opacity:1; transform:translateY(0); } }
        @keyframes fadeUp   { from { opacity:0; transform:translateY(36px);  } to { opacity:1; transform:translateY(0); } }
        @keyframes pulse    { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.55; transform:scale(0.95); } }
        @keyframes floatSlow { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-8px); } }
        @keyframes shimmer  { 0% { background-position:-200% center; } 100% { background-position:200% center; } }

        @media (max-width: 640px) {
            .page-wrapper { padding: 28px 16px 56px; }
            .card { padding: 32px 24px; }
            .site-header { margin-bottom: 36px; }
            .site-logo img { height: 200px; }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <div class="page-wrapper">
        <header class="site-header">
            <a href="{% url 'home' %}" class="site-logo">
                <img src="{% static 'quiz/img/logo.png' %}" alt="Intimement Nous">
            </a>
            <span class="site-tagline">Découvrez votre porte d'entrée dans l'intimité</span>
            <div class="logo-ornement">
                <div class="logo-ornement-line"></div>
                <div class="logo-ornement-dot"></div>
                <div class="logo-ornement-line right"></div>
            </div>
        </header>
        <div class="container">
            {% if messages %}
                <div class="messages">
                    {% for message in messages %}
                        <div class="message {% if message.tags %}{{ message.tags }}{% endif %}">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}
            {% block content %}{% endblock %}
        </div>
    </div>
</body>
</html>
